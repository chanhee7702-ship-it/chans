<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle-container">
        <button id="theme-toggle">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Lottery Number Generator</h1>
        <div class="numbers-display"></div>
        <button id="generate-btn">Generate Numbers</button>
        
        <div class="partnership-form">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xnjbkara" method="POST">
                <div class="form-group">
                    <label for="email">Your Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required placeholder="Tell us about your proposal..."></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
